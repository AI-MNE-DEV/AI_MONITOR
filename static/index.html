<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MONITOR - War Room</title>
    <style>
        /* === RESET & BASE === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2332;
            --border: #1e293b;
            --text-primary: #e0e6ed;
            --text-secondary: #8892a4;
            --text-muted: #4b5563;
            --green: #00ff88;
            --green-dim: #00cc6a;
            --yellow: #ffaa00;
            --red: #ff3366;
            --red-glow: rgba(255, 51, 102, 0.3);
            --blue: #3b82f6;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === HEADER / STATUS BAR === */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-primary);
        }

        .global-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .global-status.ok { background: rgba(0,255,136,0.12); color: var(--green); }
        .global-status.degraded { background: rgba(255,170,0,0.12); color: var(--yellow); }
        .global-status.critical { background: var(--red-glow); color: var(--red); }
        .global-status.pending { background: rgba(59,130,246,0.12); color: var(--blue); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
            transition: opacity 0.3s ease;
        }

        .live-dot.pulse {
            animation: pulse-dot 1s ease-in-out;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.4); }
        }

        .live-dot.disconnected {
            background: var(--red);
            animation: pulse-red 1.5s ease-in-out infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .alert-badge {
            font-family: var(--font-mono);
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .alert-badge.has-alerts {
            background: var(--red-glow);
            color: var(--red);
        }

        .alert-badge.clear {
            background: rgba(0,255,136,0.08);
            color: var(--green-dim);
        }

        /* === MAIN GRID === */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 1rem;
            padding: 1rem 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* === CARD === */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: #2d3a4d;
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .card-title .status-dot.ok { background: var(--green); }
        .card-title .status-dot.degraded { background: var(--yellow); }
        .card-title .status-dot.critical, .card-title .status-dot.failed { background: var(--red); }
        .card-title .status-dot.pending { background: var(--blue); }

        /* === METRIC DISPLAY === */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .metric {
            text-align: center;
        }

        .metric-value {
            font-family: var(--font-mono);
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            transition: color 0.3s ease;
        }

        .metric-value.ok { color: var(--green); }
        .metric-value.warning { color: var(--yellow); }
        .metric-value.critical { color: var(--red); }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 0.4rem;
        }

        .metric-unit {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* === DISK I/O (smaller metrics) === */
        .io-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .io-metric-value {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* === CONTAINER TABLE === */
        .container-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .container-table th {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .container-table td {
            padding: 0.6rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(30,41,59,0.5);
            color: var(--text-primary);
        }

        .container-table tr:last-child td { border-bottom: none; }

        .container-status {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .container-status.running { background: rgba(0,255,136,0.12); color: var(--green); }
        .container-status.exited { background: rgba(255,170,0,0.12); color: var(--yellow); }
        .container-status.created { background: rgba(59,130,246,0.12); color: var(--blue); }

        .docker-summary {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .docker-stat {
            text-align: center;
        }

        .docker-stat-value {
            font-family: var(--font-mono);
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* === ALERTS FEED === */
        .alerts-card {
            grid-column: 1 / -1;
        }

        .alert-list {
            max-height: 250px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid rgba(30,41,59,0.5);
            transition: background 0.2s ease;
        }

        .alert-item:hover { background: var(--bg-card-hover); }
        .alert-item:last-child { border-bottom: none; }

        .alert-level {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            min-width: 65px;
            text-align: center;
        }

        .alert-level.WARNING { background: rgba(255,170,0,0.15); color: var(--yellow); }
        .alert-level.CRITICAL { background: var(--red-glow); color: var(--red); }
        .alert-level.INFO { background: rgba(59,130,246,0.12); color: var(--blue); }

        .alert-message {
            flex: 1;
            font-size: 0.82rem;
            color: var(--text-primary);
        }

        .alert-time {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .no-alerts {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
            font-size: 0.85rem;
        }

        /* === RESPONSIVE === */
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .metric-value { font-size: 2.2rem; }
            .alerts-card { grid-column: 1; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-left">
        <span class="logo">AI MONITOR</span>
        <div id="globalStatus" class="global-status pending">
            <span>CONNECTING</span>
        </div>
    </div>
    <div class="header-right">
        <span id="alertBadge" class="alert-badge clear">0 ALERTS</span>
        <span><span id="liveDot" class="live-dot disconnected"></span> <span id="wsStatus">Disconnected</span></span>
        <span id="clock" style="font-family: var(--font-mono);">--:--:--</span>
    </div>
</header>

<!-- DASHBOARD GRID -->
<main class="dashboard">

    <!-- HOST METRICS -->
    <section class="card" id="hostCard">
        <div class="card-title">
            <span id="hostStatusDot" class="status-dot pending"></span>
            HOST METRICS
        </div>
        <div class="metrics-grid">
            <div class="metric">
                <div id="cpuValue" class="metric-value ok">--</div>
                <div class="metric-label">CPU <span class="metric-unit">%</span></div>
            </div>
            <div class="metric">
                <div id="ramValue" class="metric-value ok">--</div>
                <div class="metric-label">RAM <span class="metric-unit">%</span></div>
            </div>
        </div>
        <div class="io-metrics">
            <div class="metric">
                <div id="diskRead" class="io-metric-value">--</div>
                <div class="metric-label">DISK READ</div>
            </div>
            <div class="metric">
                <div id="diskWrite" class="io-metric-value">--</div>
                <div class="metric-label">DISK WRITE</div>
            </div>
        </div>
    </section>

    <!-- DOCKER METRICS -->
    <section class="card" id="dockerCard">
        <div class="card-title">
            <span id="dockerStatusDot" class="status-dot pending"></span>
            DOCKER CONTAINERS
        </div>
        <div class="docker-summary">
            <div class="docker-stat">
                <div id="totalContainers" class="docker-stat-value">--</div>
                <div class="metric-label">TOTAL</div>
            </div>
            <div class="docker-stat">
                <div id="runningContainers" class="docker-stat-value" style="color: var(--green);">--</div>
                <div class="metric-label">RUNNING</div>
            </div>
        </div>
        <div style="max-height: 200px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;">
            <table class="container-table">
                <thead>
                    <tr>
                        <th>NAME</th>
                        <th>STATUS</th>
                        <th>CPU %</th>
                        <th>RAM MB</th>
                    </tr>
                </thead>
                <tbody id="containerList">
                    <tr><td colspan="4" style="text-align:center; color:var(--text-muted);">Waiting for data...</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <!-- ALERTS FEED -->
    <section class="card alerts-card">
        <div class="card-title">
            <span id="alertStatusDot" class="status-dot ok"></span>
            ACTIVE ALERTS
        </div>
        <div id="alertList" class="alert-list">
            <div class="no-alerts">No active alerts</div>
        </div>
    </section>

</main>

<script>
(function() {
    'use strict';

    // === DOM REFS ===
    const $ = (id) => document.getElementById(id);
    const cpuValue = $('cpuValue');
    const ramValue = $('ramValue');
    const diskRead = $('diskRead');
    const diskWrite = $('diskWrite');
    const hostStatusDot = $('hostStatusDot');
    const dockerStatusDot = $('dockerStatusDot');
    const alertStatusDot = $('alertStatusDot');
    const totalContainers = $('totalContainers');
    const runningContainers = $('runningContainers');
    const containerList = $('containerList');
    const alertList = $('alertList');
    const globalStatus = $('globalStatus');
    const alertBadge = $('alertBadge');
    const liveDot = $('liveDot');
    const wsStatus = $('wsStatus');
    const clock = $('clock');

    // === HELPERS ===
    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
    }

    function getMetricClass(value, warnThreshold, critThreshold) {
        if (value >= critThreshold) return 'critical';
        if (value >= warnThreshold) return 'warning';
        return 'ok';
    }

    function timeAgo(isoString) {
        const now = new Date();
        const then = new Date(isoString);
        const seconds = Math.floor((now - then) / 1000);
        if (seconds < 5) return 'just now';
        if (seconds < 60) return seconds + 's ago';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
        return Math.floor(seconds / 3600) + 'h ago';
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    // === CLOCK ===
    setInterval(() => {
        clock.textContent = new Date().toLocaleTimeString('it-IT', { hour12: false });
    }, 1000);

    // === UPDATE FUNCTIONS ===
    function updateHost(host) {
        const cpu = host.cpu_percent;
        const ram = host.ram_percent;

        cpuValue.textContent = cpu.toFixed(1);
        cpuValue.className = 'metric-value ' + getMetricClass(cpu, 90, 95);

        ramValue.textContent = ram.toFixed(1);
        ramValue.className = 'metric-value ' + getMetricClass(ram, 85, 90);

        diskRead.textContent = formatBytes(host.disk_io_read_bytes || 0);
        diskWrite.textContent = formatBytes(host.disk_io_write_bytes || 0);

        hostStatusDot.className = 'status-dot ' + (host.status || 'ok');
    }

    function updateDocker(docker) {
        totalContainers.textContent = docker.total_containers;
        runningContainers.textContent = docker.running_containers;

        dockerStatusDot.className = 'status-dot ' + (docker.status || 'ok');

        if (!docker.containers || docker.containers.length === 0) {
            containerList.innerHTML =
                '<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No containers</td></tr>';
            return;
        }

        let html = '';
        for (const c of docker.containers) {
            const statusClass = c.status === 'running' ? 'running' :
                                c.status === 'exited' ? 'exited' : 'created';
            html += '<tr>' +
                '<td>' + escapeHtml(c.name) + '</td>' +
                '<td><span class="container-status ' + statusClass + '">' + escapeHtml(c.status) + '</span></td>' +
                '<td>' + (c.cpu_percent || 0).toFixed(1) + '</td>' +
                '<td>' + (c.ram_usage_mb || 0).toFixed(1) + '</td>' +
                '</tr>';
        }
        containerList.innerHTML = html;
    }

    function updateAlerts(alerts) {
        const count = alerts.length;

        if (count === 0) {
            alertList.innerHTML = '<div class="no-alerts">No active alerts</div>';
            alertBadge.textContent = '0 ALERTS';
            alertBadge.className = 'alert-badge clear';
            alertStatusDot.className = 'status-dot ok';
            return;
        }

        alertBadge.textContent = count + ' ALERT' + (count > 1 ? 'S' : '');
        alertBadge.className = 'alert-badge has-alerts';

        const hasCritical = alerts.some(a => a.level === 'CRITICAL');
        alertStatusDot.className = 'status-dot ' + (hasCritical ? 'critical' : 'degraded');

        let html = '';
        for (const a of alerts) {
            html += '<div class="alert-item">' +
                '<span class="alert-level ' + escapeHtml(a.level) + '">' + escapeHtml(a.level) + '</span>' +
                '<span class="alert-message">' + escapeHtml(a.message) + '</span>' +
                '<span class="alert-time">' + timeAgo(a.timestamp) + '</span>' +
                '</div>';
        }
        alertList.innerHTML = html;
    }

    function updateGlobalStatus(data) {
        const hostStatus = data.host.status || 'ok';
        const dockerStatus = data.docker.status || 'ok';
        const alertCount = (data.active_alerts || []).length;
        const hasCritical = (data.active_alerts || []).some(a => a.level === 'CRITICAL');

        let status = 'ok';
        let label = 'OPERATIONAL';

        if (hasCritical || hostStatus === 'failed' || dockerStatus === 'failed') {
            status = 'critical';
            label = 'CRITICAL';
        } else if (alertCount > 0 || hostStatus === 'degraded' || dockerStatus === 'degraded') {
            status = 'degraded';
            label = 'DEGRADED';
        }

        globalStatus.className = 'global-status ' + status;
        globalStatus.innerHTML = '<span>' + label + '</span>';
    }

    // === WEBSOCKET ===
    let ws = null;
    let reconnectDelay = 1000;

    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = protocol + '//' + location.host + '/ws/telemetry';

        ws = new WebSocket(url);

        ws.onopen = function() {
            wsStatus.textContent = 'Live';
            liveDot.className = 'live-dot';
            reconnectDelay = 1000;
        };

        ws.onmessage = function(event) {
            // Heartbeat pulse
            liveDot.classList.remove('pulse');
            void liveDot.offsetWidth; // force reflow
            liveDot.classList.add('pulse');

            try {
                const msg = JSON.parse(event.data);

                if (msg.type === 'system_status') {
                    const d = msg.data;
                    updateHost(d.host);
                    updateDocker(d.docker);
                    updateAlerts(d.active_alerts || []);
                    updateGlobalStatus(d);
                } else if (msg.type === 'alert') {
                    // Flash alert momentaneo gestito dal prossimo system_status
                }
            } catch (e) {
                console.error('Parse error:', e);
            }
        };

        ws.onclose = function() {
            wsStatus.textContent = 'Reconnecting...';
            liveDot.className = 'live-dot disconnected';
            globalStatus.className = 'global-status pending';
            globalStatus.innerHTML = '<span>RECONNECTING</span>';

            setTimeout(connect, reconnectDelay);
            reconnectDelay = Math.min(reconnectDelay * 2, 10000);
        };

        ws.onerror = function() {
            ws.close();
        };
    }

    connect();
})();
</script>

</body>
</html>
